<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Chess Board</title>
    <style>
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 80px);
            grid-template-rows: repeat(8, 80px);
            border: 4px solid #8B4513;
            gap: 0;
        }
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .piece {
            font-size: 50px;
            cursor: grab;
            user-select: none;
        }
        .piece.dragging { opacity: 0.5; }
        .square.drag-over { background-color: yellow !important; }
    </style>
</head>
<body>
    <div class="chess-board" id="chessBoard"></div>

    <script>
        let draggedPiece = null;

        // Create 8x8 board
        const board = document.getElementById('chessBoard');
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const square = document.createElement('div');
                square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                board.appendChild(square);
                
                // Add some pieces for testing
                if (row === 0 && col < 3) {
                    const piece = document.createElement('div');
                    piece.className = 'piece black';
                    piece.textContent = '♜';
                    piece.draggable = true;
                    console.log('Adding piece to', row, col);
                    square.appendChild(piece);
                }
            }
        }

        // Same working drag handlers as test
        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('piece')) {
                draggedPiece = e.target;
                e.target.classList.add('dragging');
                console.log('Drag started');
            }
        });

        document.addEventListener('dragend', (e) => {
            if (e.target.classList.contains('piece')) {
                e.target.classList.remove('dragging');
                document.querySelectorAll('.square').forEach(s => s.classList.remove('drag-over'));
                draggedPiece = null;
                console.log('Drag ended');
            }
        });

        document.addEventListener('dragover', (e) => {
            if (e.target.classList.contains('square')) {
                e.preventDefault();
            }
        });

        document.addEventListener('dragenter', (e) => {
            if (e.target.classList.contains('square') && draggedPiece) {
                e.target.classList.add('drag-over');
            }
        });

        document.addEventListener('dragleave', (e) => {
            if (e.target.classList.contains('square')) {
                e.target.classList.remove('drag-over');
            }
        });

        document.addEventListener('drop', (e) => {
            if (e.target.classList.contains('square') && draggedPiece) {
                e.preventDefault();
                e.target.classList.remove('drag-over');
                
                const existingPiece = e.target.querySelector('.piece');
                if (existingPiece) {
                    existingPiece.remove();
                }
                
                e.target.appendChild(draggedPiece);
                console.log('Piece moved');
            }
        });
    </script>
</body>
</html>
